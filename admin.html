<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EP Survey Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #071f17;
      --panel: rgba(7,31,23,0.98);
      --border: rgba(168,224,74,0.18);
      --accent: #a8e04a;
      --accent-strong: #d4f78c;
      --text: #ebf3e8;
      --muted: #b5c6b7;
      --shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(168,224,74,0.08), transparent 30%),
                  linear-gradient(180deg, #08271d 0%, #071f17 100%);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }
    main { max-width: 1040px; margin: 0 auto; padding: 32px 24px 48px; }
    h1 { margin: 0 0 8px; font-size: clamp(2rem, 2.8vw, 3.4rem); line-height: 1.02; }
    .subtitle { margin: 0 0 28px; color: var(--muted); font-size: 1rem; line-height: 1.7; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
      backdrop-filter: blur(18px);
    }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-top: 20px; }
    .field-group { display: grid; gap: 8px; }
    .wide { grid-column: 1 / -1; }
    label { font-size: 0.92rem; font-weight: 600; color: var(--text); }
    input, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.98rem;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: rgba(168,224,74,0.7);
      box-shadow: 0 0 0 4px rgba(168,224,74,0.14);
    }
    input[readonly] {
      background: rgba(255,255,255,0.02);
      border-color: rgba(168,224,74,0.1);
      color: var(--muted);
      cursor: not-allowed;
    }
    input[readonly]:focus { border-color: rgba(168,224,74,0.1); box-shadow: none; }
    .help { margin-top: 6px; color: rgba(168,224,74,0.72); font-size: 0.88rem; }
    .button-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-top: 24px; }
    button {
      border: none; border-radius: 100px; cursor: pointer;
      padding: 14px 24px; font-size: 1rem; font-weight: 700;
      color: #072418;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 18px 32px rgba(0,0,0,0.2); }
    .secondary {
      background: transparent; color: var(--muted);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .status { margin-top: 18px; font-size: 0.96rem; color: var(--muted); line-height: 1.6; }
    .status.error { color: #ff6b6b; }
    .status.success { color: var(--accent); }
    @media (max-width: 820px) {
      .field-grid { grid-template-columns: 1fr; }
      main { padding: 24px 16px 32px; }
    }
  </style>
</head>
<body>
<main>
  <h1>EP Survey Data Manager</h1>
  <p class="subtitle">Use this form to review and edit survey entries for each country. Save &amp; Generate will download an updated <strong>data.js</strong> file — upload it to GitHub to update the live site.</p>

  <div class="card">
    <div class="field-group wide">
      <label for="countrySelect">Choose country</label>
      <select id="countrySelect"><option value="">-- Loading countries... --</option></select>
      <div class="help">Select an existing country or choose "Add New Country" to enter a new record.</div>
    </div>

    <div class="field-grid">
      <div class="field-group">
        <label for="countryName">Country name</label>
        <input id="countryName" type="text" placeholder="e.g. Kenya" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="region">Region</label>
        <select id="region">
          <option value="Africa">Africa</option>
          <option value="Southeast Asia">Southeast Asia</option>
        </select>
      </div>
      <div class="field-group">
        <label for="population">Population (millions)</label>
        <input id="population" type="number" step="0.1" min="0" placeholder="e.g. 56.4">
      </div>
      <div class="field-group">
        <label for="ablatingEPs">Ablating EPs</label>
        <input id="ablatingEPs" type="number" step="1" min="0" placeholder="e.g. 1">
      </div>
      <div class="field-group">
        <label for="deviceEPs">Device EPs</label>
        <input id="deviceEPs" type="number" step="1" min="0" placeholder="e.g. 35">
      </div>
      <div class="field-group">
        <label for="ablationRatio">Ablation ratio</label>
        <input id="ablationRatio" type="text" placeholder="Auto-calculated" readonly>
      </div>
      <div class="field-group">
        <label for="deviceRatio">Device ratio</label>
        <input id="deviceRatio" type="text" placeholder="Auto-calculated" readonly>
      </div>
      <div class="field-group">
        <label for="deviceCenters">Device centers</label>
        <input id="deviceCenters" type="number" step="1" min="0" placeholder="e.g. 16">
      </div>
      <div class="field-group">
        <label for="ablationCenters">Ablation centers</label>
        <input id="ablationCenters" type="number" step="1" min="0" placeholder="e.g. 4">
      </div>
      <div class="field-group">
        <label for="visitingEP">Visiting EP status</label>
        <select id="visitingEP">
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field-group">
        <label for="lastUpdated">Last updated</label>
        <input id="lastUpdated" type="text" placeholder="e.g. Apr 7, 2026">
      </div>
    </div>

    <div class="button-row">
      <button id="saveButton">Save &amp; Generate data.js</button>
      <button id="clearButton" class="secondary">Reset form</button>
    </div>
    <div class="status" id="statusText">Loading survey data...</div>
  </div>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────
  let originalDataText = '';
  let countryData = {};

  // ── DOM refs ───────────────────────────────────────────────────────
  const countrySelect = document.getElementById('countrySelect');
  const statusText    = document.getElementById('statusText');
  const fields = {
    countryName:    document.getElementById('countryName'),
    region:         document.getElementById('region'),
    population:     document.getElementById('population'),
    ablatingEPs:    document.getElementById('ablatingEPs'),
    deviceEPs:      document.getElementById('deviceEPs'),
    ablationRatio:  document.getElementById('ablationRatio'),
    deviceRatio:    document.getElementById('deviceRatio'),
    deviceCenters:  document.getElementById('deviceCenters'),
    ablationCenters:document.getElementById('ablationCenters'),
    visitingEP:     document.getElementById('visitingEP'),
    lastUpdated:    document.getElementById('lastUpdated'),
  };

  // ── Load data.js dynamically ───────────────────────────────────────
  async function loadDataJs() {
    try {
      const res = await fetch('./data.js?v=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      originalDataText = await res.text();
      parseAndInit();
    } catch(e) {
      setStatus('Error loading data.js: ' + e.message, 'error');
    }
  }

  // ── Parse countryEPData from fetched text ──────────────────────────
  function parseAndInit() {
    try {
      const match = originalDataText.match(/const\s+countryEPData\s*=\s*(\{[\s\S]*?\}\s*;)/);
      if (!match) throw new Error('countryEPData not found in data.js');
      // Use Function constructor to safely evaluate the object
      countryData = new Function('return ' + match[1].replace(/;$/, ''))();
      populateDropdown();
      setStatus('Loaded ' + Object.keys(countryData).length + ' countries. Select one to edit.');
    } catch(e) {
      setStatus('Error parsing data.js: ' + e.message, 'error');
    }
  }

  // ── Populate country dropdown ──────────────────────────────────────
  function populateDropdown() {
    countrySelect.innerHTML = '<option value="">-- Select country --</option>';
    const sorted = Object.keys(countryData).sort();
    sorted.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      countrySelect.appendChild(opt);
    });
    const addOpt = document.createElement('option');
    addOpt.value = '__new__';
    addOpt.textContent = 'Add New Country';
    countrySelect.appendChild(addOpt);
  }

  // ── Calculate ratios ───────────────────────────────────────────────
  function updateRatios() {
    const pop      = parseFloat(fields.population.value) || 0;
    const ablating = parseFloat(fields.ablatingEPs.value) || 0;
    const device   = parseFloat(fields.deviceEPs.value) || 0;
    fields.ablationRatio.value = ablating > 0 ? (pop / ablating).toFixed(1) + 'M/EP' : 'N/A';
    fields.deviceRatio.value   = device   > 0 ? (pop / device).toFixed(1)   + 'M/EP' : 'N/A';
  }

  // ── Load country into form ─────────────────────────────────────────
  function loadCountry(name) {
    if (name === '__new__' || name === '') {
      clearForm();
      if (name === '__new__') setStatus('Enter details for the new country.');
      return;
    }
    const d = countryData[name];
    if (!d) return;
    fields.countryName.value     = name;
    fields.population.value      = d.pop ?? '';
    fields.ablatingEPs.value     = d.ablatingEPs ?? '';
    fields.deviceEPs.value       = d.deviceEPs ?? '';
    fields.deviceCenters.value   = d.deviceCenters ?? '';
    fields.ablationCenters.value = d.ablationCenters ?? '';
    fields.visitingEP.value      = d.visitingEP ?? 'Yes';
    fields.lastUpdated.value     = d.lastUpdated ?? '';
    // Detect region from known SEA countries
    const sea = ['Cambodia','Vietnam','Mongolia','Laos','Thailand','Myanmar','Philippines','Indonesia','Malaysia','Singapore','Timor-Leste'];
    fields.region.value = sea.includes(name) ? 'Southeast Asia' : 'Africa';
    updateRatios();
    setStatus('Loaded data for ' + name + '. Edit fields and click Save.');
  }

  // ── Clear form ─────────────────────────────────────────────────────
  function clearForm() {
    Object.values(fields).forEach(f => { if (f.tagName === 'INPUT') f.value = ''; });
    fields.visitingEP.value = 'Yes';
    fields.region.value = 'Africa';
    countrySelect.value = '';
    setStatus('Form cleared.');
  }

  // ── Build updated data.js text ─────────────────────────────────────
  function buildUpdatedDataJs() {
    const name = fields.countryName.value.trim();
    if (!name) { setStatus('Please enter a country name.', 'error'); return null; }

    const pop      = parseFloat(fields.population.value) || 0;
    const ablating = parseInt(fields.ablatingEPs.value) || 0;
    const device   = parseInt(fields.deviceEPs.value) || 0;
    const aRatio   = ablating > 0 ? (pop / ablating).toFixed(1) + 'M/EP' : 'N/A';
    const dRatio   = device   > 0 ? (pop / device).toFixed(1)   + 'M/EP' : 'N/A';

    // Update countryData in memory
    countryData[name] = {
      pop,
      ablatingEPs:    ablating,
      deviceEPs:      device,
      ablationRatio:  aRatio,
      deviceRatio:    dRatio,
      deviceCenters:  parseInt(fields.deviceCenters.value) || 0,
      ablationCenters:parseInt(fields.ablationCenters.value) || 0,
      visitingEP:     fields.visitingEP.value,
      lastUpdated:    fields.lastUpdated.value || new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}),
    };

    // Rebuild countryEPData block
    const lines = Object.entries(countryData).map(([k, v]) =>
      `  "${k}": { pop: ${v.pop}, ablatingEPs: ${v.ablatingEPs}, deviceEPs: ${v.deviceEPs}, ablationRatio: "${v.ablationRatio}", deviceRatio: "${v.deviceRatio}", ablationCenters: ${v.ablationCenters}, deviceCenters: ${v.deviceCenters}, visitingEP: "${v.visitingEP}", lastUpdated: "${v.lastUpdated}" }`
    );
    const newBlock = 'const countryEPData = {\n' + lines.join(',\n') + '\n};';

    // Replace the old block in the original file text
    const updated = originalDataText.replace(/const\s+countryEPData\s*=\s*\{[\s\S]*?\}\s*;/, newBlock);
    if (updated === originalDataText) {
      setStatus('Warning: could not find countryEPData block to replace. Check data.js format.', 'error');
      return null;
    }
    return updated;
  }

  // ── Save & download ────────────────────────────────────────────────
  function saveAndDownload() {
    const text = buildUpdatedDataJs();
    if (!text) return;
    const blob = new Blob([text], { type: 'text/javascript' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'data.js';
    a.click();
    URL.revokeObjectURL(url);
    setStatus('✅ data.js downloaded! Upload it to GitHub to update the live site.', 'success');
  }

  // ── Helpers ────────────────────────────────────────────────────────
  function setStatus(msg, type = '') {
    statusText.textContent = msg;
    statusText.className = 'status' + (type ? ' ' + type : '');
  }

  // ── Event listeners ────────────────────────────────────────────────
  countrySelect.addEventListener('change', e => loadCountry(e.target.value));
  document.getElementById('saveButton').addEventListener('click', saveAndDownload);
  document.getElementById('clearButton').addEventListener('click', clearForm);
  ['population','ablatingEPs','deviceEPs'].forEach(id =>
    document.getElementById(id).addEventListener('input', updateRatios)
  );

  // ── Boot ───────────────────────────────────────────────────────────
  loadDataJs();
</script>
</body>
</html>
